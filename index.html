<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Pokémon Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:.75rem .875rem 2rem}
.tab-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:.875rem}
.tab-scroll::-webkit-scrollbar{display:none}
.game-tabs{display:flex;gap:5px;width:max-content;padding:2px 0}
.game-tab{padding:7px 13px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;white-space:nowrap;touch-action:manipulation}
.game-tab.active{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd;font-weight:600}
#gt-home,#gt-fr,#gt-lg{border-color:#1D9E75;color:#1D9E75;font-weight:600}
#gt-home.active,#gt-fr.active,#gt-lg.active{background:#e8f7f2;color:#0f6e56;border-color:#1D9E75}
#gt-go{border-color:#e53935;color:#e53935;font-weight:600}
#gt-go.active{background:#fde8e8;color:#b71c1c;border-color:#e53935}
#go-ui{display:none}
.go-filter-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:.75rem}
.go-filter-scroll::-webkit-scrollbar{display:none}
.go-filter-row{display:flex;gap:5px;width:max-content;padding:2px 0}
.go-filter-btn{padding:7px 12px;border:1px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text2);cursor:pointer;font-size:12px;touch-action:manipulation;font-family:inherit;white-space:nowrap}
.go-filter-btn.active{background:#fde8e8;color:#b71c1c;border-color:#e53935;font-weight:600}
.go-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
@media(min-width:480px){.go-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:680px){.go-grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr))}}
.go-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:8px 8px 10px;position:relative}
.go-card.go-got{border-color:var(--caught-border);background:var(--caught-bg)}
.go-card-sprite{width:64px;height:64px;display:block;margin:0 auto 2px;image-rendering:pixelated}
.go-card-num{font-size:10px;color:var(--text3);text-align:center}
.go-card-name{font-size:12px;font-weight:600;color:var(--text);text-align:center;text-transform:capitalize;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.go-card-types{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-bottom:5px}
.go-badges{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-bottom:6px;min-height:22px}
.go-badge{padding:3px 6px;border-radius:999px;font-size:9px;font-weight:700;cursor:pointer;border:1.5px solid transparent;opacity:.28;touch-action:manipulation}
.go-badge.on{opacity:1;border-color:rgba(0,0,0,0.12)}
.go-badge-caught{background:#d1fae5;color:#065f46}
.go-badge-shiny{background:#fef3c7;color:#92400e}
.go-badge-shadow{background:#ede9fe;color:#4c1d95}
.go-badge-purified{background:#dbeafe;color:#1e3a8a}
.go-badge-lucky{background:#fef9c3;color:#854d0e}
.go-badge-xl{background:#fee2e2;color:#991b1b}
.go-legend{font-size:11px;color:var(--text2);margin-bottom:.75rem;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:.625rem}
.title{font-size:16px;font-weight:600;color:var(--text)}
.subtitle{font-size:11px;color:var(--text2);margin-top:1px}
.stats{display:flex;gap:5px}
.stat{background:var(--stat-bg);border-radius:8px;padding:5px 10px;text-align:center;min-width:52px}
.stat-num{font-size:17px;font-weight:600;color:#111}
.stat-label{font-size:10px;color:var(--text2)}
.progress-bar{height:5px;background:var(--border);border-radius:999px;margin-bottom:.875rem;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:999px;transition:width .3s}
.search-row{margin-bottom:.625rem}
.search-row input{width:100%;padding:10px 14px;border:1px solid var(--border2);border-radius:10px;font-size:16px;background:var(--input-bg);color:var(--text);outline:none}
.search-row input:focus{border-color:#93c5fd}
.filter-scroll,.type-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:.625rem}
.filter-scroll::-webkit-scrollbar,.type-scroll::-webkit-scrollbar{display:none}
.filter-row,.type-row{display:flex;gap:5px;width:max-content;padding:2px 0}
.filter-btn{padding:7px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:var(--text2);cursor:pointer;font-size:12px;white-space:nowrap;touch-action:manipulation}
.filter-btn.active{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd;font-weight:600}
.type-btn{padding:5px 10px;border-radius:999px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid transparent;opacity:.5;white-space:nowrap;touch-action:manipulation;min-height:30px}
.type-btn.active{opacity:1;border-color:rgba(0,0,0,0.25)}
.legend{font-size:11px;color:var(--text2);margin-bottom:.75rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.legend-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.ve-badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:680px){.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:8px 8px 10px;position:relative;touch-action:manipulation}
.card.caught{border-color:var(--caught-border);background:var(--caught-bg)}
.card.shiny-caught{border-color:var(--shiny-border);background:var(--shiny-bg)}
.corner-dots{position:absolute;top:7px;right:8px;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.dot{width:7px;height:7px;border-radius:50%}
.dot-trade{background:#8F72D4}
.dot-event{background:#E24B4A}
.card-sprite{width:64px;height:64px;display:block;margin:0 auto 2px;image-rendering:pixelated}
.card-num{font-size:10px;color:var(--text3);text-align:center}
.card-name{font-size:12px;font-weight:600;color:var(--text);text-align:center;text-transform:capitalize;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-types{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-bottom:7px}
.type-badge{padding:2px 6px;border-radius:999px;font-size:9px;font-weight:600}
.card-actions{display:flex;gap:4px}
.action-btn{flex:1;padding:7px 2px;border:1px solid var(--border2);border-radius:8px;background:var(--bg2);font-size:11px;cursor:pointer;color:var(--text2);touch-action:manipulation;min-height:36px}
.action-btn.on{background:#1D9E75;border-color:#1D9E75;color:#fff;font-weight:600}
.action-btn.shiny-on{background:#d97706;border-color:#b45309;color:#fff}
.icon-btn{width:36px;height:36px;border:1px solid var(--border2);border-radius:8px;background:var(--bg2);cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;padding:0;font-size:14px;flex-shrink:0;touch-action:manipulation}
.icon-btn.has-note{color:#d97706;border-color:#d97706}
.icon-btn.has-loc{color:#2563eb;border-color:#93c5fd}
.modal-backdrop{position:fixed;inset:0;background:var(--shadow-bg);display:flex;align-items:flex-end;justify-content:center;z-index:100}
@media(min-width:600px){.modal-backdrop{align-items:center}}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid #eee;padding:1rem 1.25rem 2.5rem;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:600px){.modal{border-radius:14px;max-width:400px;max-height:82vh;padding-bottom:1.25rem;border:1px solid #eee}}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:999px;margin:0 auto 1rem}
.modal-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.modal-sprite{width:56px;height:56px;image-rendering:pixelated}
.modal-name{font-size:16px;font-weight:700;color:var(--text);text-transform:capitalize}
.modal-meta{font-size:12px;color:var(--text2);margin-top:2px}
.modal-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.tag{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600}
.tag-excl{background:#dbeafe;color:#1d4ed8}
.tag-trade{background:#ede9fe;color:#6d28d9}
.tag-event{background:#fee2e2;color:#b91c1c}
.sec-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.loc-list{display:flex;flex-direction:column;gap:4px;margin-bottom:1rem}
.loc-item{font-size:13px;color:var(--text);padding:8px 10px;background:var(--loc-bg);border-radius:8px}
.modal textarea{width:100%;min-height:80px;resize:vertical;margin-bottom:.875rem;font-size:16px;padding:10px;border:1px solid var(--border2);background:var(--input-bg);color:var(--text);border-radius:8px;font-family:inherit;outline:none}
.modal textarea:focus{border-color:#93c5fd}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.btn-primary{padding:10px 18px;background:#1D9E75;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;touch-action:manipulation}
.btn-ghost{padding:10px 18px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:14px;cursor:pointer;touch-action:manipulation}
.empty{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px}

:root{--bg:#f8f8f6;--bg2:#fff;--text:#1a1a1a;--text2:#666;--text3:#aaa;--border:#eee;--border2:#ddd;--caught-bg:#e8f7f2;--caught-border:#1D9E75;--shiny-bg:#fef3c7;--shiny-border:#d97706;--shadow-bg:rgba(0,0,0,0.45);--stat-bg:#f0f0ee;--loc-bg:#f5f5f3;--input-bg:#fff;}
body.dark{--bg:#111;--bg2:#1e1e1e;--text:#f0f0f0;--text2:#999;--text3:#555;--border:#2e2e2e;--border2:#3a3a3a;--caught-bg:#0d2e22;--shiny-bg:#2e2200;--shadow-bg:rgba(0,0,0,0.7);--stat-bg:#252525;--loc-bg:#252525;--input-bg:#1e1e1e;}
</style>
<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="main-wrapper">
<div class="tab-scroll"><div class="game-tabs" id="game-tabs"></div></div>
<div id="toolbar" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:1rem;padding:.625rem .875rem;background:var(--bg2);border:1px solid var(--border);border-radius:12px"><span style="font-size:13px;font-weight:700;color:var(--text);flex:1">Pokémon Tracker</span><button onclick="showStats()" style="padding:6px 10px;border:1px solid var(--border2);border-radius:8px;background:transparent;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;touch-action:manipulation">📊 Stats</button><button onclick="showHomeSync()" style="padding:6px 10px;border:1px solid var(--border2);border-radius:8px;background:transparent;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;touch-action:manipulation">🏠 Sync</button><button onclick="exportData()" style="padding:6px 10px;border:1px solid var(--border2);border-radius:8px;background:transparent;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;touch-action:manipulation">⬇ Export</button><label style="padding:6px 10px;border:1px solid var(--border2);border-radius:8px;background:transparent;font-size:12px;cursor:pointer;color:var(--text2);touch-action:manipulation">⬆ Import<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label><button onclick="authToggle()" id="auth-btn" style="padding:6px 10px;border:1px solid var(--border2);border-radius:8px;background:transparent;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;touch-action:manipulation">☁️ Sign in</button><button onclick="toggleDark()" id="dark-btn" style="padding:6px 10px;border:1px solid var(--border2);border-radius:8px;background:transparent;font-size:14px;cursor:pointer;touch-action:manipulation" title="Toggle dark mode">🌙</button></div>
<div id="app">
<div class="header-row">
    <div><div class="title" id="game-title"></div><div class="subtitle" id="game-sub"></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="s-caught">0</div><div class="stat-label">caught</div></div>
      <div class="stat"><div class="stat-num" id="s-shiny">0</div><div class="stat-label">shiny</div></div>
      <div class="stat"><div class="stat-num" id="s-pct">0%</div><div class="stat-label">done</div></div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div class="search-row"><input type="text" id="search" placeholder="Search name or #..." oninput="render()"></div>
  <div class="filter-scroll"><div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('caught',this)">Caught</button>
    <button class="filter-btn" onclick="setFilter('uncaught',this)">Uncaught</button>
    <button class="filter-btn" onclick="setFilter('shiny',this)">Shiny</button>
    <button class="filter-btn" onclick="setFilter('exclusive',this)">Version excl.</button>
    <button class="filter-btn" onclick="setFilter('trade',this)">Needs trade</button>
    <button class="filter-btn" onclick="setFilter('event',this)">Event only</button>
    <button class="filter-btn" onclick="setFilter('wishlist',this)">⭐ Wishlist</button>
  </div></div>
  <div class="type-scroll"><div class="type-row" id="type-filters"></div></div>
  <div class="legend" id="legend"></div>
  <div class="grid" id="grid"></div>
</div>  <!-- end #app -->

<!-- Pokémon GO panel -->
<div id="go-ui" style="display:none">
  <div class="header-row">
    <div><div class="title">Pokémon GO</div><div class="subtitle" id="go-sub"></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="go-s-caught">0</div><div class="stat-label">caught</div></div>
      <div class="stat"><div class="stat-num" id="go-s-shiny">0</div><div class="stat-label">shiny</div></div>
      <div class="stat"><div class="stat-num" id="go-s-pct">0%</div><div class="stat-label">done</div></div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="go-progress" style="width:0%"></div></div>
  <div class="search-row"><input type="text" id="go-search" placeholder="Search name or number..." oninput="renderGO()"></div>
  <div class="go-filter-scroll"><div class="go-filter-row">
    <button class="go-filter-btn active" onclick="setGOFilter('all',this)">All</button>
    <button class="go-filter-btn" onclick="setGOFilter('caught',this)">Caught</button>
    <button class="go-filter-btn" onclick="setGOFilter('uncaught',this)">Uncaught</button>
    <button class="go-filter-btn" onclick="setGOFilter('shiny',this)">Shiny</button>
    <button class="go-filter-btn" onclick="setGOFilter('shadow',this)">Shadow</button>
    <button class="go-filter-btn" onclick="setGOFilter('purified',this)">Purified</button>
    <button class="go-filter-btn" onclick="setGOFilter('lucky',this)">Lucky</button>
    <button class="go-filter-btn" onclick="setGOFilter('xl',this)">XL candy</button>
    <button class="go-filter-btn" onclick="setGOFilter('wishlist',this)">⭐ Wishlist</button>
  </div></div>
  <div class="type-scroll"><div class="type-row" id="go-type-filters"></div></div>
  <div class="go-legend">
    <span style="font-weight:600;color:#b71c1c">Tap badges on each card:</span>
    <span class="go-badge go-badge-caught on">caught</span>
    <span class="go-badge go-badge-shiny on">✦ shiny</span>
    <span class="go-badge go-badge-shadow on">shadow</span>
    <span class="go-badge go-badge-purified on">purified</span>
    <span class="go-badge go-badge-lucky on">lucky</span>
    <span class="go-badge go-badge-xl on">XL</span>
  </div>
  <div class="go-grid" id="go-grid"></div>
</div>
</div><!-- end main-wrapper -->


<div id="modal" style="display:none" class="modal-backdrop">
  <div class="modal" id="modal-inner">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <img class="modal-sprite" id="m-sprite" src="" alt="">
      <div><div class="modal-name" id="m-name"></div><div class="modal-meta" id="m-meta"></div><div class="modal-tags" id="m-tags"></div></div>
    </div>
    <div id="m-loc-sec"><div class="sec-title">Where to find</div><div class="loc-list" id="m-locs"></div></div>
    <div class="sec-title">Your note</div>
    <textarea id="m-note" placeholder="Add a note..."></textarea>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>
const TC={fire:["#FAC775","#633806"],grass:["#C0DD97","#27500A"],water:["#B5D4F4","#0C447C"],poison:["#CECBF6","#26215C"],bug:["#C0DD97","#3B6D11"],flying:["#B5D4F4","#185FA5"],normal:["#D3D1C7","#5F5E5A"],electric:["#FAC775","#633806"],psychic:["#F4C0D1","#72243E"],fighting:["#F5C4B3","#712B13"],ground:["#F5C4B3","#633806"],rock:["#D3D1C7","#444441"],ice:["#B5D4F4","#0C447C"],ghost:["#CECBF6","#3C3489"],dragon:["#AFA9EC","#3C3489"],steel:["#D3D1C7","#5F5E5A"],dark:["#888780","#2C2C2A"],fairy:["#F4C0D1","#4B1528"]};

function render(){
  const gd=GAME_DATA[cGame];const list=gd.pokemon;
  const q=document.getElementById('search').value.toLowerCase();
  const total=list.length,caught=list.filter(p=>gs(p[0]).caught).length,shiny=list.filter(p=>gs(p[0]).shiny).length,pct=Math.round(caught/total*100);
  document.getElementById('game-title').textContent=gd.label;document.getElementById('game-sub').textContent=gd.gen+' Pokémon';
  document.getElementById('s-caught').textContent=caught;document.getElementById('s-shiny').textContent=shiny;document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('progress').style.width=pct+'%';
  const filtered=list.filter(p=>{const[id,name,types,excl,trade,event]=p;const s=gs(id);if(q&&!name.includes(q)&&!String(id).includes(q))return false;if(cType&&!types.includes(cType))return false;if(cFilter==='caught')return s.caught;if(cFilter==='uncaught')return!s.caught;if(cFilter==='shiny')return s.shiny;if(cFilter==='exclusive')return excl&&excl.length>0;if(cFilter==='trade')return!!trade;if(cFilter==='event')return!!event;return true;});
  // Sort by regional dex number when available, else national
  filtered.sort((a,b)=>{
    const ra=regionalNum(cGame,a[0]),rb=regionalNum(cGame,b[0]);
    if(ra&&rb)return ra-rb;
    if(ra)return -1;
    if(rb)return 1;
    return a[0]-b[0];
  });
  const grid=document.getElementById('grid');
  if(!filtered.length){grid.innerHTML='<div class="empty">No Pokémon match your filters.</div>';return}
  grid.innerHTML=filtered.map(p=>{
    const[id,name,types,excl,trade,event]=p;const s=gs(id);
    let cc='card';if(s.caught&&s.shiny)cc='card shiny-caught';else if(s.caught)cc='card caught';
    const tb=types.map(t=>{const[bg,col]=TC[t]||['#ccc','#555'];return`<span class="type-badge" style="background:${bg};color:${col}">${t}</span>`}).join('');
    const hasLoc=!!(LOCS[cGame]&&LOCS[cGame][id]);
    let dots='<div class="corner-dots">';
    if(excl&&excl.length){const v=excl[0];const vc=GAME_DATA[cGame].vColors;const[bg]=vc&&vc[v]?vc[v]:['#ccc'];dots+=`<div class="dot" style="background:${bg}" title="${excl.join('/')} exclusive"></div>`}
    if(trade)dots+='<div class="dot dot-trade" title="Needs trade"></div>';
    if(event)dots+='<div class="dot dot-event" title="Event only"></div>';
    dots+='</div>';
    return`<div class="${cc}">${dots}<img class="card-sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png" alt="${name}" loading="lazy" onerror="this.style.display='none'"><div class="card-num">${(()=>{const r=regionalNum(cGame,id);return r?'#'+String(r).padStart(3,'0')+' <span style="color:var(--text3);font-size:9px">(#'+String(id).padStart(4,'0')+')</span>':'#'+String(id).padStart(4,'0')})()}</div><div class="card-name">${name}</div><div class="card-types">${tb}</div><div class="card-actions"><button class="action-btn${s.caught?' on':''}" onclick="toggle(${id},'caught')">${s.caught?'✓':'catch'}</button><button class="action-btn${s.shiny?' shiny-on':''}" onclick="toggle(${id},'shiny')">★</button><button class="icon-btn${s.note?' has-note':(hasLoc?' has-loc':'')}" onclick="openModal(${id})">${hasLoc?'📍':'✎'}</button><button id="wlb-${id}" class="icon-btn" onclick="wlToggle(${id})" style="${wishlist.has(id)?'color:#d97706;border-color:#d97706':''}" title="Wishlist">⭐</button></div></div>`
  }).join('')
}

// ── EXPORT / IMPORT ──
function exportData(){
  const data={state,goState,wishlist:[...wishlist],version:1};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='pokemon_tracker_save.json';a.click();
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.state){state=data.state;save();}
      if(data.goState){goState=data.goState;goSave();}
      if(data.wishlist){wishlist=new Set(data.wishlist);wlSave();}
      render();renderGO();alert('Import successful!');
    }catch(err){alert('Could not read save file.');}
  };
  reader.readAsText(file);e.target.value='';
}

}

// GO tracks: caught, shiny, shadow, purified, lucky, xl (XL candy obtained)
const GO_SKEY = 'pktracker_go_v1';
let goState = {};
let goFilter = 'all';
let goType = null;

function goLoad(){try{goState=JSON.parse(localStorage.getItem(GO_SKEY)||'{}')}catch(e){goState={}}}
function goSave(){try{localStorage.setItem(GO_SKEY,JSON.stringify(goState))}catch(e){}}
function goGet(id){return goState[id]||{caught:false,shiny:false,shadow:false,purified:false,lucky:false,xl:false}}
function goToggle(id,key){
  const s=goGet(id);
  s[key]=!s[key];
  // purified implies caught; shadow and purified are mutually exclusive
  if(key==='purified'&&s.purified){s.caught=true;s.shadow=false}
  if(key==='shadow'&&s.shadow){s.purified=false}
  if(key==='caught'&&!s.caught){s.shadow=false;s.purified=false;s.lucky=false}
  goState[id]=s;
  goSave();
  renderGO();
}
function setGOFilter(f,btn){goFilter=f;document.querySelectorAll('.go-filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderGO();}
function setGOType(t){goType=goType===t?null:t;document.querySelectorAll('#go-type-filters .type-btn').forEach(b=>b.classList.toggle('active',b.dataset.type===goType));renderGO();}

const GO_POKEMON = HOME_ALL.filter(p=>GO_AVAILABLE.has(p[0]));

function renderGO(){
  const q=document.getElementById('go-search').value.toLowerCase();
  const total=GO_POKEMON.length;
  const caught=GO_POKEMON.filter(p=>goGet(p[0]).caught).length;
  const shiny=GO_POKEMON.filter(p=>goGet(p[0]).shiny).length;
  const pct=Math.round(caught/total*100);
  document.getElementById('go-sub').textContent=GO_POKEMON.length+' available in GO';
  document.getElementById('go-s-caught').textContent=caught;
  document.getElementById('go-s-shiny').textContent=shiny;
  document.getElementById('go-s-pct').textContent=pct+'%';
  document.getElementById('go-progress').style.width=pct+'%';

  const filtered=GO_POKEMON.filter(p=>{
    const[id,name,types]=p;const s=goGet(id);
    if(q&&!name.includes(q)&&!String(id).includes(q))return false;
    if(goType&&!types.includes(goType))return false;
    if(goFilter==='caught')return s.caught;
    if(goFilter==='uncaught')return!s.caught;
    if(goFilter==='shiny')return s.shiny;
    if(goFilter==='shadow')return s.shadow;
    if(goFilter==='purified')return s.purified;
    if(goFilter==='lucky')return s.lucky;
    if(goFilter==='xl')return s.xl;
    if(goFilter==='wishlist')return wishlist.has(id);
    return true;
  });

  const grid=document.getElementById('go-grid');
  if(!filtered.length){grid.innerHTML='<div class="empty">No Pokémon match your filters.</div>';return}

  grid.innerHTML=filtered.map(p=>{
    const[id,name,types]=p;const s=goGet(id);
    const tb=types.map(t=>{const[bg,col]=TC[t]||['#ccc','#555'];return`<span class="type-badge" style="background:${bg};color:${col}">${t}</span>`}).join('');
    const cc='go-card'+(s.caught?' go-got':'');
    const badges=[
      {key:'caught',cls:'go-badge-caught',label:'caught'},
      {key:'shiny',cls:'go-badge-shiny',label:'✦ shiny'},
      {key:'shadow',cls:'go-badge-shadow',label:'shadow'},
      {key:'purified',cls:'go-badge-purified',label:'purified'},
      {key:'lucky',cls:'go-badge-lucky',label:'lucky'},
      {key:'xl',cls:'go-badge-xl',label:'XL'},
    ].map(b=>`<button class="go-badge ${b.cls}${s[b.key]?' on':''}" onclick="goToggle(${id},'${b.key}')">${b.label}</button>`).join('');
    return`<div class="${cc}"><img class="go-card-sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png" alt="${name}" loading="lazy" onerror="this.style.display='none'"><div class="go-card-num">#${String(id).padStart(4,'0')}</div><div class="go-card-name">${name}</div><div class="go-card-types">${tb}</div><div class="go-badges">${badges}<button class="go-badge${wishlist.has(id)?' on':''}" onclick="wlToggle(${id})" style="${wishlist.has(id)?'background:#fef3c7;color:#92400e':''}" >⭐</button></div></div>`;
  }).join('');
}

function showGO(){
  document.getElementById('app').style.display='none';
  document.getElementById('go-ui').style.display='block';
  document.querySelectorAll('.game-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('gt-go').classList.add('active');
  renderGO();
}

// Merge two state objects — "caught/shiny/wishlist TRUE wins" logic
function mergeStates(local, cloud){
  const merged = {...cloud};  // start with cloud
  for(const k in local){
    const lv = local[k];
    const cv = cloud[k];
    if(!cv){merged[k] = lv; continue;}
    merged[k] = {
      caught: lv.caught || cv.caught,
      shiny:  lv.shiny  || cv.shiny,
      note:   lv.note || cv.note || '',
      shadow: lv.shadow || cv.shadow,
      purified: lv.purified || cv.purified,
      lucky:  lv.lucky || cv.lucky,
      xl:     lv.xl || cv.xl,
    };
  }
  return merged;
}
function mergeWishlists(local, cloud){
  return [...new Set([...local, ...cloud])];
}
function mergeGoState(local, cloud){
  const merged = {...cloud};
  for(const k in local){
    const lv = local[k], cv = cloud[k];
    if(!cv){merged[k] = lv; continue;}
    merged[k] = {
      caught: lv.caught || cv.caught,
      shiny:  lv.shiny  || cv.shiny,
      shadow: lv.shadow || cv.shadow,
      purified: lv.purified || cv.purified,
      lucky:  lv.lucky || cv.lucky,
      xl:     lv.xl || cv.xl,
    };
  }
  return merged;
}

async function pullFromCloud(){
  if(!fbUser)return null;
  try{
    const doc = await fbDb.collection('pokemon_tracker').doc(fbUser.uid).get();
    return doc.exists ? doc.data() : null;
  }catch(e){console.error('Pull failed:',e);return null;}
}

async function pushToCloud(){
  if(!fbUser || fbSyncing)return;
  fbSyncing = true;
  try{
    await fbDb.collection('pokemon_tracker').doc(fbUser.uid).set({
      state: state,
      goState: goState,
      wishlist: [...wishlist],
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  }catch(e){console.error('Push failed:',e);}
  fbSyncing = false;
}

async function onSignedIn(user){
  fbUser = user;
  updateAuthUI();
  // Pull cloud data
  const cloud = await pullFromCloud();
  if(cloud){
    // Merge: both-true wins
    state = mergeStates(state, cloud.state || {});
    goState = mergeGoState(goState, cloud.goState || {});
    wishlist = new Set(mergeWishlists([...wishlist], cloud.wishlist || []));
    save(); goSave(); wlSave();
  }
  // Push merged result back
  await pushToCloud();
  render(); renderGO();
}

function onSignedOut(){
  fbUser = null;
  updateAuthUI();
}

function updateAuthUI(){
  const btn = document.getElementById('auth-btn');
  if(!btn)return;
  if(fbUser){
    const name = fbUser.displayName ? fbUser.displayName.split(' ')[0] : 'signed in';
    btn.textContent = '☁️ ' + name;
    btn.title = 'Click to sign out — ' + fbUser.email;
  } else {
    btn.textContent = '☁️ Sign in';
    btn.title = 'Sign in to sync across devices';
  }
}

function authToggle(){
  if(fbUser){
    if(confirm('Sign out? Your data will stay on this device but won\'t sync.')){
      fbAuth.signOut();
    }
  } else {
    const provider = new firebase.auth.GoogleAuthProvider();
    fbAuth.signInWithPopup(provider).catch(err=>{
      alert('Sign-in failed: ' + err.message);
    });
  }
}

// Wire up auth state listener
fbAuth.onAuthStateChanged(user=>{
  if(user) onSignedIn(user);
  else onSignedOut();
});

// Hook into save() and goSave() to auto-push when signed in
const _origSave = save;
save = function(){_origSave(); if(fbUser) pushToCloud();};
const _origGoSave = goSave;
goSave = function(){_origGoSave(); if(fbUser) pushToCloud();};
const _origWlSave = wlSave;
wlSave = function(){_origWlSave(); if(fbUser) pushToCloud();};


goLoad();wlLoad();initDark();
load();setGame('fr');
</script>
